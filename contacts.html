<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contacts - Sajid</title>
    <link rel="stylesheet" href="style.css">
    <!-- আইকনের জন্য Font Awesome ব্যবহার করা হয়েছে -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="mobile-wrapper">
        
        <div class="profile-info" style="margin-top: 40px;">
            <h1>যোগাযোগ</h1>
            <p>আমার সাথে কানেক্ট থাকার মাধ্যমসমূহ</p>
        </div>

        <div class="links-container">
            
            <!-- মেইন পেজে ফিরে যাওয়ার বাটন -->
            <a href="index.html" class="action-card" style="text-decoration: none; color: inherit; display: block; margin-bottom: 25px; background: #222;">
                <div class="card-content">
                    <div class="text" style="text-align: center; width: 100%;">
                        <h3 style="color: #fff;">← পেছনে যাও</h3>
                    </div>
                </div>
            </a>

            <!-- কন্টাক্ট কার্ডসমূহ -->
            <div style="background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-family: 'Hind Siliguri', sans-serif;">
                
                <!-- ফোন নাম্বার -->
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <i class="fas fa-phone" style="font-size: 20px; color: #00f2fe; margin-right: 15px; width: 25px; text-align: center;"></i>
                    <div>
                        <span style="font-size: 14px; color: #aaa; display: block;">ফোন নাম্বার</span>
                        <strong style="font-size: 16px;">+৮৮০ ১XXXXXXXXX</strong>
                    </div>
                </div>

                <!-- হোয়াটসঅ্যাপ -->
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <i class="fab fa-whatsapp" style="font-size: 22px; color: #25D366; margin-right: 15px; width: 25px; text-align: center;"></i>
                    <div>
                        <span style="font-size: 14px; color: #aaa; display: block;">হোয়াটসঅ্যাপ</span>
                        <strong style="font-size: 16px;">+৮৮০ ১XXXXXXXXX</strong>
                    </div>
                </div>

                <!-- জিমেইল -->
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <i class="fas fa-envelope" style="font-size: 20px; color: #EA4335; margin-right: 15px; width: 25px; text-align: center;"></i>
                    <div>
                        <span style="font-size: 14px; color: #aaa; display: block;">জিমেইল</span>
                        <strong style="font-size: 16px;">sajid@gmail.com</strong>
                    </div>
                </div>

                <!-- ফেসবুক -->
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <i class="fab fa-facebook" style="font-size: 22px; color: #1877F2; margin-right: 15px; width: 25px; text-align: center;"></i>
                    <div>
                        <span style="font-size: 14px; color: #aaa; display: block;">ফেসবুক প্রোফাইল</span>
                        <a href="https://facebook.com/yourprofile" target="_blank" style="color: #00f2fe; text-decoration: none; font-weight: bold; font-size: 16px;">fb.com/yourprofile</a>
                    </div>
                </div>

                <!-- ঠিকানা -->
                <div style="display: flex; align-items: center;">
                    <i class="fas fa-map-marker-alt" style="font-size: 20px; color: #ff007f; margin-right: 15px; width: 25px; text-align: center;"></i>
                    <div>
                        <span style="font-size: 14px; color: #aaa; display: block;">বর্তমান ঠিকানা</span>
                        <strong style="font-size: 16px;">ঢাকা, বাংলাদেশ</strong>
                    </div>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
